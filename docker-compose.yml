services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    user: root
    command: start --user root --pass root --bind 0.0.0.0:8000 surrealkv:///data/db
    volumes:
      - surreal_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingestion:
    build: .
    env_file: .env
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
    volumes:
      - ./data:/app/data
    depends_on:
      surrealdb:
        condition: service_healthy
    command: ["uv", "run", "python", "-m", "ingestion.run_all"]
    profiles:
      - ingest

  bot:
    build: .
    env_file: .env
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      REDIS_URL: redis://redis:6379
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8080:8080"
    depends_on:
      surrealdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    build: ./admin/backend
    env_file: .env
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      STATIC_DIR: /app/static
    volumes:
      - ./admin/frontend/dist:/app/static:ro
    ports:
      - "8001:8001"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  surreal_data:
  redis_data:
